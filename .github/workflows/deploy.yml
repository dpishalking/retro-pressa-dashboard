name: Deploy Retro Pressa

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: retro-pressa-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_DIR: /opt/retro-pressa
      APP_SHARED_DIR: /opt/retro-pressa-shared
      APP_NAME: retro-pressa
      APP_PORT: "4174"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create deploy archive
        run: |
          mkdir -p /tmp/retro-pressa-deploy/.next
          cp -R .next/standalone/. /tmp/retro-pressa-deploy/
          cp -R .next/static /tmp/retro-pressa-deploy/.next/static
          cp -R public /tmp/retro-pressa-deploy/public
          tar -czf /tmp/retro-pressa-deploy.tar.gz -C /tmp/retro-pressa-deploy .
          mv /tmp/retro-pressa-deploy.tar.gz retro-pressa-deploy.tar.gz

      - name: Create runtime env
        env:
          BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GOOGLE_TRAFFIC_CSV_URL: ${{ secrets.GOOGLE_TRAFFIC_CSV_URL }}
          GOOGLE_TRAFFIC_SHEET_ID: ${{ secrets.GOOGLE_TRAFFIC_SHEET_ID }}
          GOOGLE_TRAFFIC_SHEET_NAME: ${{ secrets.GOOGLE_TRAFFIC_SHEET_NAME }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          GOOGLE_GEMINI_API_KEY: ${{ secrets.GOOGLE_GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const keys = [
            "BITRIX_WEBHOOK_URL",
            "GEMINI_API_KEY",
            "GEMINI_MODEL",
            "GOOGLE_TRAFFIC_CSV_URL",
            "GOOGLE_TRAFFIC_SHEET_ID",
            "GOOGLE_TRAFFIC_SHEET_NAME",
            "GOOGLE_AI_API_KEY",
            "GOOGLE_API_KEY",
            "GOOGLE_GENERATIVE_AI_API_KEY",
            "GOOGLE_GEMINI_API_KEY",
            "GOOGLE_SHEET_ID",
            "GOOGLE_SERVICE_ACCOUNT_JSON",
            "GOOGLE_SERVICE_ACCOUNT_EMAIL",
            "GOOGLE_PRIVATE_KEY"
          ];
          const env = Object.fromEntries(keys.map((key) => [key, process.env[key] || ""]));
          fs.writeFileSync("runtime-env.json", JSON.stringify(env, null, 2));
          NODE

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload archive
        run: |
          scp -i ~/.ssh/deploy_key retro-pressa-deploy.tar.gz \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/retro-pressa-deploy.tar.gz"
          scp -i ~/.ssh/deploy_key runtime-env.json \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/retro-pressa-runtime-env.json"

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" << 'EOF'
          set -e
          if ! command -v pm2 > /dev/null; then
            npm install -g pm2
          fi
          APP_DIR="/opt/retro-pressa"
          APP_SHARED_DIR="/opt/retro-pressa-shared"
          APP_DATA_DIR="$APP_SHARED_DIR/data"
          mkdir -p "$APP_DIR" "$APP_DATA_DIR/bitrix-snapshots" "$APP_DATA_DIR/google-snapshots" "$APP_DATA_DIR/conversation-snapshots"
          find "$APP_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -xzf /tmp/retro-pressa-deploy.tar.gz -C "$APP_DIR"
          cd "$APP_DIR"
          ln -sfn "$APP_DATA_DIR" data
          cp /tmp/retro-pressa-runtime-env.json runtime-env.json
          chmod 600 runtime-env.json
          cat > ecosystem.config.cjs <<'PM2EOF'
          const runtimeEnv = require("./runtime-env.json");

          module.exports = {
            apps: [
              {
                name: "retro-pressa",
                script: "server.js",
                env: {
                  ...runtimeEnv,
                  NODE_ENV: "production",
                  PORT: "4174",
                  HOSTNAME: "0.0.0.0"
                }
              }
            ]
          };
          PM2EOF
          if pm2 describe retro-pressa > /dev/null; then
            pm2 delete retro-pressa
          fi
          pm2 start ecosystem.config.cjs
          pm2 save
          EOF
