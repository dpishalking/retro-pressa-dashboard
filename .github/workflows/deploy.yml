name: Deploy Retro Pressa

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: retro-pressa-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_DIR: /opt/retro-pressa
      APP_SHARED_DIR: /opt/retro-pressa-shared
      APP_NAME: retro-pressa
      APP_PORT: "4174"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create deploy archive
        run: |
          mkdir -p /tmp/retro-pressa-deploy/.next
          cp -R .next/standalone/. /tmp/retro-pressa-deploy/
          cp -R .next/static /tmp/retro-pressa-deploy/.next/static
          cp -R public /tmp/retro-pressa-deploy/public
          if [ -d data/conversation-exports ]; then
            cp -R data/conversation-exports /tmp/retro-pressa-deploy/conversation-exports
          fi
          if [ -f data/training/products.json ]; then
            mkdir -p /tmp/retro-pressa-deploy/training-seed
            cp data/training/products.json /tmp/retro-pressa-deploy/training-seed/products.json
            cp scripts/patch-training-catalog-from-seed.mjs /tmp/retro-pressa-deploy/training-seed/patch-training-catalog-from-seed.mjs
          fi
          if [ -f data/training/crm-modules.json ]; then
            mkdir -p /tmp/retro-pressa-deploy/training-seed
            cp data/training/crm-modules.json /tmp/retro-pressa-deploy/training-seed/crm-modules.json
          fi
          if [ -f data/training/practice-modules.json ]; then
            mkdir -p /tmp/retro-pressa-deploy/training-seed
            cp data/training/practice-modules.json /tmp/retro-pressa-deploy/training-seed/practice-modules.json
          fi
          cp -R scripts/trainer-backend-overlay /tmp/retro-pressa-deploy/trainer-backend-overlay
          tar -czf /tmp/retro-pressa-deploy.tar.gz -C /tmp/retro-pressa-deploy .
          mv /tmp/retro-pressa-deploy.tar.gz retro-pressa-deploy.tar.gz

      - name: Create runtime env
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          DEFAULT_ADMIN_LOGIN: ${{ secrets.DEFAULT_ADMIN_LOGIN }}
          DEFAULT_ADMIN_PASSWORD: ${{ secrets.DEFAULT_ADMIN_PASSWORD }}
          BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GOOGLE_TRAFFIC_CSV_URL: ${{ secrets.GOOGLE_TRAFFIC_CSV_URL }}
          GOOGLE_TRAFFIC_SHEET_ID: ${{ secrets.GOOGLE_TRAFFIC_SHEET_ID }}
          GOOGLE_TRAFFIC_SHEET_NAME: ${{ secrets.GOOGLE_TRAFFIC_SHEET_NAME }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          GOOGLE_GEMINI_API_KEY: ${{ secrets.GOOGLE_GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          TRAINER_API_URL: ${{ secrets.TRAINER_API_URL }}
          TRAINER_ADMIN_API_KEY: ${{ secrets.TRAINER_ADMIN_API_KEY }}
          TRAINER_SERVICE_TAG: ${{ secrets.TRAINER_SERVICE_TAG }}
          TRAINER_BOT_USERNAME: ${{ secrets.TRAINER_BOT_USERNAME }}
          TRAINER_BOT_TOKEN: ${{ secrets.TRAINER_BOT_TOKEN }}
          TRAINER_NOTIFY_TELEGRAM_IDS: ${{ secrets.TRAINER_NOTIFY_TELEGRAM_IDS }}
          TRAINER_BACKEND_PUBLIC_URL: ${{ secrets.TRAINER_BACKEND_PUBLIC_URL }}
          ADMIN_TELEGRAM_IDS: ${{ secrets.ADMIN_TELEGRAM_IDS }}
          ROP_ALERTS_TELEGRAM_CHAT_IDS: ${{ secrets.ROP_ALERTS_TELEGRAM_CHAT_IDS }}
        run: |
          node - <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");

          const authSecret = process.env.AUTH_SECRET || "";
          const adminKey =
            process.env.TRAINER_ADMIN_API_KEY ||
            (authSecret
              ? crypto.createHash("sha256").update(authSecret).digest("hex").slice(0, 32)
              : "change-me-trainer-admin");
          const trainerBackendPublicUrl =
            process.env.TRAINER_BACKEND_PUBLIC_URL || "http://85.92.111.202:3100";
          const trainerApiUrl = process.env.TRAINER_API_URL || trainerBackendPublicUrl;
          const trainerBotUsername = process.env.TRAINER_BOT_USERNAME || "dushnila12_bot";
          const trainerBotToken =
            process.env.TRAINER_BOT_TOKEN ||
            process.env.TRAINER_NOTIFY_BOT_TOKEN ||
            "";
          const trainerNotifyIds =
            process.env.TRAINER_NOTIFY_TELEGRAM_IDS ||
            process.env.ROP_ALERTS_TELEGRAM_CHAT_IDS ||
            process.env.ADMIN_TELEGRAM_IDS ||
            "";

          const keys = [
            "AUTH_SECRET",
            "DEFAULT_ADMIN_LOGIN",
            "DEFAULT_ADMIN_PASSWORD",
            "BITRIX_WEBHOOK_URL",
            "GEMINI_API_KEY",
            "GEMINI_MODEL",
            "GOOGLE_TRAFFIC_CSV_URL",
            "GOOGLE_TRAFFIC_SHEET_ID",
            "GOOGLE_TRAFFIC_SHEET_NAME",
            "GOOGLE_AI_API_KEY",
            "GOOGLE_API_KEY",
            "GOOGLE_GENERATIVE_AI_API_KEY",
            "GOOGLE_GEMINI_API_KEY",
            "GOOGLE_SHEET_ID",
            "GOOGLE_SERVICE_ACCOUNT_JSON",
            "GOOGLE_SERVICE_ACCOUNT_EMAIL",
            "GOOGLE_PRIVATE_KEY"
          ];
          const env = Object.fromEntries(keys.map((key) => [key, process.env[key] || ""]));
          env.TRAINER_API_URL = trainerApiUrl;
          env.TRAINER_ADMIN_API_KEY = adminKey;
          env.TRAINER_SERVICE_TAG = process.env.TRAINER_SERVICE_TAG || "retro-pressa";
          env.TRAINER_BOT_USERNAME = trainerBotUsername;
          env.TRAINING_DATA_DIR = "/opt/retro-pressa-shared/data/training";
          env.AUTH_USERS_FILE = "/opt/retro-pressa-shared/data/auth/users.json";
          env.AUTH_CATALOG_DIR = "/opt/retro-pressa-shared/auth-catalog";
          fs.writeFileSync("runtime-env.json", JSON.stringify(env, null, 2));

          const backendEnv = {
            PORT: "3100",
            NODE_ENV: "production",
            DATABASE_PATH: "/opt/pressa-backend-shared/data/gift-ai.db",
            GEMINI_API_KEY: process.env.GEMINI_API_KEY || "",
            GEMINI_MODEL: process.env.GEMINI_MODEL || "gemini-2.5-flash",
            GEMINI_MODEL_FALLBACK: "gemini-2.5-flash-lite",
            ADMIN_API_KEY: adminKey,
            TRAINER_BOT_USERNAME: trainerBotUsername,
            TRAINER_BOT_TOKEN: trainerBotToken,
            TRAINER_NOTIFY_BOT_TOKEN: trainerBotToken,
            TRAINER_NOTIFY_TELEGRAM_IDS: trainerNotifyIds,
            ADMIN_TELEGRAM_IDS: process.env.ADMIN_TELEGRAM_IDS || "",
            ROP_ALERTS_TELEGRAM_CHAT_IDS: process.env.ROP_ALERTS_TELEGRAM_CHAT_IDS || "",
            PUBLIC_API_URL: trainerBackendPublicUrl,
            CRM_PROVIDER: "none",
            LOG_LEVEL: "info"
          };
          fs.writeFileSync("trainer-backend-env.json", JSON.stringify(backendEnv, null, 2));

          if (!trainerNotifyIds) {
            console.warn(
              "WARNING: TRAINER_NOTIFY_TELEGRAM_IDS is empty — ROP will not receive Telegram reports after training"
            );
          }
          if (!trainerBotToken) {
            console.warn(
              "WARNING: TRAINER_BOT_TOKEN is empty — training notify messages cannot be sent"
            );
          }
          NODE

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload archive
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "rm -rf /tmp/trainer-backend-overlay /tmp/overlay-fallback"
          scp -i ~/.ssh/deploy_key retro-pressa-deploy.tar.gz \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/retro-pressa-deploy.tar.gz"
          scp -i ~/.ssh/deploy_key runtime-env.json \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/retro-pressa-runtime-env.json"
          scp -i ~/.ssh/deploy_key trainer-backend-env.json \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/trainer-backend-env.json"
          scp -i ~/.ssh/deploy_key -r scripts/trainer-backend-overlay \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/trainer-backend-overlay"

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" << 'EOF'
          set -e
          if ! command -v pm2 > /dev/null; then
            npm install -g pm2
          fi
          if ! command -v git > /dev/null; then
            echo "git is required for trainer backend deploy" >&2
            exit 1
          fi

          BACKEND_DATA="/opt/pressa-backend-shared/data"
          BACKEND_ENV="/opt/pressa-backend/runtime-env.json"
          PRESSA_SRC="/opt/pressa-src"
          mkdir -p "$BACKEND_DATA" /opt/pressa-backend

          OVERLAY_DIR="/tmp/trainer-backend-overlay"
          if [ ! -f "$OVERLAY_DIR/manager-sessions.ts" ]; then
            mkdir -p /tmp/overlay-fallback
            tar -xzf /tmp/retro-pressa-deploy.tar.gz -C /tmp/overlay-fallback ./trainer-backend-overlay
            OVERLAY_DIR="/tmp/overlay-fallback/trainer-backend-overlay"
          fi
          if [ ! -f "$OVERLAY_DIR/manager-sessions.ts" ]; then
            echo "Trainer overlay missing on server" >&2
            exit 1
          fi

          if [ ! -d "$PRESSA_SRC/.git" ]; then
            git clone --depth 1 https://github.com/dpishalking/pressa.git "$PRESSA_SRC"
          else
            cd "$PRESSA_SRC"
            git fetch --depth 1 origin main
            git reset --hard origin/main
          fi

          node "$OVERLAY_DIR/apply-patch.mjs" "$PRESSA_SRC/gift-ai"
          cd "$PRESSA_SRC/gift-ai"
          npm ci
          npm run build -w backend
          cp /tmp/trainer-backend-env.json "$BACKEND_ENV"
          chmod 600 "$BACKEND_ENV"

          cat > "$PRESSA_SRC/gift-ai/backend/ecosystem.config.cjs" <<'PM2BACKEND'
          const runtimeEnv = require("/opt/pressa-backend/runtime-env.json");

          module.exports = {
            apps: [
              {
                name: "pressa-backend",
                script: "dist/index.js",
                cwd: "/opt/pressa-src/gift-ai/backend",
                env: {
                  ...runtimeEnv,
                  NODE_ENV: "production"
                }
              }
            ]
          };
          PM2BACKEND

          if pm2 describe pressa-backend > /dev/null; then
            pm2 delete pressa-backend
          fi
          pm2 start "$PRESSA_SRC/gift-ai/backend/ecosystem.config.cjs"
          sleep 5
          curl -f -sS http://127.0.0.1:3100/health > /dev/null
          curl -f -sS http://127.0.0.1:3100/trainer/scenarios > /dev/null
          if ! node -e "const env=require('$BACKEND_ENV'); if(!env.GEMINI_API_KEY){process.exit(1)}"; then
            echo "WARNING: GEMINI_API_KEY is empty — trainer bot replies will fail until the secret is set" >&2
          fi
          node - <<'NODE'
          const env = require("/opt/pressa-backend/runtime-env.json");
          const ids = String(env.TRAINER_NOTIFY_TELEGRAM_IDS || env.ROP_ALERTS_TELEGRAM_CHAT_IDS || env.ADMIN_TELEGRAM_IDS || "")
            .split(",")
            .map((id) => id.trim())
            .filter(Boolean);
          const token = env.TRAINER_BOT_TOKEN || env.TRAINER_NOTIFY_BOT_TOKEN || "";
          console.log("Trainer notify recipients:", ids.length ? ids.join(", ") : "NONE");
          console.log("Trainer notify bot token:", token ? "configured" : "MISSING");
          if (!ids.length) {
            console.warn("Add GitHub secret TRAINER_NOTIFY_TELEGRAM_IDS (ROP Telegram chat id)");
          }
          NODE
          echo "Railway trainer-bot should use API_URL=${TRAINER_BACKEND_PUBLIC_URL:-http://85.92.111.202:3100} to reach this backend"

          # Trainer Telegram bot runs on Railway only (retro-pressa-bot / trainer-bot).
          # Never start it on VPS — duplicate token causes silent failures in Telegram.
          if pm2 describe pressa-trainer-bot > /dev/null 2>&1; then
            pm2 delete pressa-trainer-bot || pm2 stop pressa-trainer-bot || true
            pm2 save
          fi
          echo "Trainer bot: Railway only (not VPS)"

          APP_DIR="/opt/retro-pressa"
          APP_SHARED_DIR="/opt/retro-pressa-shared"
          APP_DATA_DIR="$APP_SHARED_DIR/data"
          AUTH_STAGING="/tmp/retro-pressa-auth-staging"
          mkdir -p "$APP_DIR" "$APP_DATA_DIR/bitrix-snapshots" "$APP_DATA_DIR/google-snapshots" "$APP_DATA_DIR/conversation-snapshots" "$APP_DATA_DIR/conversation-exports" "$APP_DATA_DIR/training" "$APP_DATA_DIR/auth" "$APP_SHARED_DIR/auth-catalog"
          AUTH_FILE="$APP_DATA_DIR/auth/users.json"
          AUTH_BACKUP="$APP_DATA_DIR/auth/users.json.bak"
          AUTH_PERSISTENT="$APP_SHARED_DIR/auth-catalog/users.json"
          mkdir -p "$AUTH_STAGING"
          # Collect every known auth catalog copy before touching APP_DIR.
          if [ -f "$AUTH_FILE" ]; then
            cp -a "$AUTH_FILE" "$AUTH_STAGING/users.json"
          fi
          if [ -f "$AUTH_BACKUP" ]; then
            cp -a "$AUTH_BACKUP" "$AUTH_STAGING/users.json.bak"
          fi
          if [ -f "$AUTH_PERSISTENT" ]; then
            cp -a "$AUTH_PERSISTENT" "$AUTH_STAGING/users.persistent.json"
          fi
          if [ -d "$APP_DIR/data" ] && [ ! -L "$APP_DIR/data" ] && [ -f "$APP_DIR/data/auth/users.json" ]; then
            echo "Recovering auth catalog from broken in-app data directory"
            cp -a "$APP_DIR/data/auth/users.json" "$AUTH_STAGING/users.recovered.json"
          fi
          # GNU rm -rf follows symlinks and would wipe $APP_DATA_DIR — remove links without -r.
          for entry in "$APP_DIR"/* "$APP_DIR"/.[!.]* ; do
            [ -e "$entry" ] || [ -L "$entry" ] || continue
            if [ -L "$entry" ]; then
              rm -f "$entry"
            else
              rm -rf "$entry"
            fi
          done
          tar -xzf /tmp/retro-pressa-deploy.tar.gz -C "$APP_DIR"
          cd "$APP_DIR"
          # ln -sfn into an existing data/ directory creates data/data instead of replacing data/.
          rm -rf "$APP_DIR/data"
          ln -sfn "$APP_DATA_DIR" "$APP_DIR/data"
          export AUTH_FILE AUTH_STAGING AUTH_PERSISTENT
          node - <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const authFile = process.env.AUTH_FILE;
          const stagingDir = process.env.AUTH_STAGING;
          const persistentFile = process.env.AUTH_PERSISTENT;

          const candidates = [
            path.join(stagingDir, "users.json"),
            path.join(stagingDir, "users.json.bak"),
            path.join(stagingDir, "users.persistent.json"),
            path.join(stagingDir, "users.recovered.json"),
            authFile,
            persistentFile
          ].filter((file) => fs.existsSync(file));

          let best = null;
          let bestCount = -1;

          for (const file of candidates) {
            try {
              const catalog = JSON.parse(fs.readFileSync(file, "utf8"));
              const count = Array.isArray(catalog.users) ? catalog.users.length : 0;
              if (count > bestCount) {
                bestCount = count;
                best = catalog;
              }
            } catch {
              // ignore invalid candidate
            }
          }

          if (!best || bestCount <= 0) {
            console.log("Auth catalog: no valid backup found, app will seed on first request");
            process.exit(0);
          }

          fs.mkdirSync(path.dirname(authFile), { recursive: true });
          fs.writeFileSync(authFile, `${JSON.stringify(best, null, 2)}\n`, "utf8");
          fs.mkdirSync(path.dirname(persistentFile), { recursive: true });
          fs.writeFileSync(persistentFile, `${JSON.stringify(best, null, 2)}\n`, "utf8");
          console.log(`Auth catalog restored with ${bestCount} user(s)`);
          NODE
          if [ -f "$AUTH_FILE" ]; then
            echo "Auth users file present"
          else
            echo "Auth users file will be created on first login"
          fi
          if [ -d "$APP_DIR/conversation-exports" ]; then
            cp -R "$APP_DIR/conversation-exports/." "$APP_DATA_DIR/conversation-exports/"
          fi
          if [ -f "$APP_DIR/training-seed/products.json" ]; then
            mkdir -p "$APP_DATA_DIR/training"
            if [ ! -f "$APP_DATA_DIR/training/products.json" ]; then
              cp "$APP_DIR/training-seed/products.json" "$APP_DATA_DIR/training/products.json"
              echo "Initialized training catalog from deploy seed"
            else
              echo "Keeping existing training catalog at $APP_DATA_DIR/training/products.json"
              node "$APP_DIR/training-seed/patch-training-catalog-from-seed.mjs" \
                "$APP_DIR/training-seed/products.json" \
                "$APP_DATA_DIR/training/products.json"
            fi
          fi
          if [ -f "$APP_DIR/training-seed/crm-modules.json" ]; then
            cp "$APP_DIR/training-seed/crm-modules.json" "$APP_DATA_DIR/training/crm-modules.json"
          fi
          if [ -f "$APP_DIR/training-seed/practice-modules.json" ]; then
            cp "$APP_DIR/training-seed/practice-modules.json" "$APP_DATA_DIR/training/practice-modules.json"
          fi
          cp /tmp/retro-pressa-runtime-env.json runtime-env.json
          chmod 600 runtime-env.json
          cat > ecosystem.config.cjs <<'PM2EOF'
          const runtimeEnv = require("./runtime-env.json");

          module.exports = {
            apps: [
              {
                name: "retro-pressa",
                script: "server.js",
                env: {
                  ...runtimeEnv,
                  NODE_ENV: "production",
                  PORT: "4174",
                  HOSTNAME: "0.0.0.0"
                }
              }
            ]
          };
          PM2EOF
          if pm2 describe retro-pressa > /dev/null; then
            pm2 delete retro-pressa
          fi
          pm2 start ecosystem.config.cjs
          pm2 save
          sleep 3
          curl -f -sS -X POST http://127.0.0.1:4174/api/conversations/seed-archives || true
          EOF
