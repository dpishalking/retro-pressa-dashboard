name: Deploy Retro Pressa

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_DIR: /opt/retro-pressa
      APP_NAME: retro-pressa
      APP_PORT: "4174"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build check
        run: npm run build

      - name: Create deploy archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.next' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.env.local' \
            -czf retro-pressa-deploy.tar.gz .

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload archive
        run: |
          scp -i ~/.ssh/deploy_key retro-pressa-deploy.tar.gz \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/retro-pressa-deploy.tar.gz"

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" << 'EOF'
          set -e
          mkdir -p /opt/retro-pressa
          tar -xzf /tmp/retro-pressa-deploy.tar.gz -C /opt/retro-pressa
          cd /opt/retro-pressa
          npm ci
          npm run build
          if pm2 describe retro-pressa > /dev/null; then
            pm2 restart retro-pressa --update-env
          else
            PORT=4174 pm2 start npm --name retro-pressa -- run start
          fi
          pm2 save
          EOF
