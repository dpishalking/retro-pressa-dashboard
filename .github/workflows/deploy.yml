name: Deploy Retro Pressa

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: retro-pressa-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_DIR: /opt/retro-pressa
      APP_SHARED_DIR: /opt/retro-pressa-shared
      APP_NAME: retro-pressa
      APP_PORT: "4174"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create deploy archive
        run: |
          mkdir -p /tmp/retro-pressa-deploy/.next
          cp -R .next/standalone/. /tmp/retro-pressa-deploy/
          cp -R .next/static /tmp/retro-pressa-deploy/.next/static
          cp -R public /tmp/retro-pressa-deploy/public
          if [ -d data/conversation-exports ]; then
            cp -R data/conversation-exports /tmp/retro-pressa-deploy/conversation-exports
          fi
          if [ -f data/training/products.json ]; then
            mkdir -p /tmp/retro-pressa-deploy/training-seed
            cp data/training/products.json /tmp/retro-pressa-deploy/training-seed/products.json
          fi
          if [ -f data/training/crm-modules.json ]; then
            mkdir -p /tmp/retro-pressa-deploy/training-seed
            cp data/training/crm-modules.json /tmp/retro-pressa-deploy/training-seed/crm-modules.json
          fi
          if [ -f data/training/practice-modules.json ]; then
            mkdir -p /tmp/retro-pressa-deploy/training-seed
            cp data/training/practice-modules.json /tmp/retro-pressa-deploy/training-seed/practice-modules.json
          fi
          cp -R scripts/trainer-backend-overlay /tmp/retro-pressa-deploy/trainer-backend-overlay
          tar -czf /tmp/retro-pressa-deploy.tar.gz -C /tmp/retro-pressa-deploy .
          mv /tmp/retro-pressa-deploy.tar.gz retro-pressa-deploy.tar.gz

      - name: Create runtime env
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          DEFAULT_ADMIN_LOGIN: ${{ secrets.DEFAULT_ADMIN_LOGIN }}
          DEFAULT_ADMIN_PASSWORD: ${{ secrets.DEFAULT_ADMIN_PASSWORD }}
          BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GOOGLE_TRAFFIC_CSV_URL: ${{ secrets.GOOGLE_TRAFFIC_CSV_URL }}
          GOOGLE_TRAFFIC_SHEET_ID: ${{ secrets.GOOGLE_TRAFFIC_SHEET_ID }}
          GOOGLE_TRAFFIC_SHEET_NAME: ${{ secrets.GOOGLE_TRAFFIC_SHEET_NAME }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          GOOGLE_GEMINI_API_KEY: ${{ secrets.GOOGLE_GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          TRAINER_API_URL: ${{ secrets.TRAINER_API_URL }}
          TRAINER_ADMIN_API_KEY: ${{ secrets.TRAINER_ADMIN_API_KEY }}
          TRAINER_SERVICE_TAG: ${{ secrets.TRAINER_SERVICE_TAG }}
          TRAINER_BOT_USERNAME: ${{ secrets.TRAINER_BOT_USERNAME }}
        run: |
          node - <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");

          const authSecret = process.env.AUTH_SECRET || "";
          const adminKey =
            process.env.TRAINER_ADMIN_API_KEY ||
            (authSecret
              ? crypto.createHash("sha256").update(authSecret).digest("hex").slice(0, 32)
              : "change-me-trainer-admin");
          const trainerApiUrl =
            process.env.TRAINER_API_URL || "https://pressa-production-d394.up.railway.app";
          const trainerBotUsername = process.env.TRAINER_BOT_USERNAME || "dushnila12_bot";

          const keys = [
            "AUTH_SECRET",
            "DEFAULT_ADMIN_LOGIN",
            "DEFAULT_ADMIN_PASSWORD",
            "BITRIX_WEBHOOK_URL",
            "GEMINI_API_KEY",
            "GEMINI_MODEL",
            "GOOGLE_TRAFFIC_CSV_URL",
            "GOOGLE_TRAFFIC_SHEET_ID",
            "GOOGLE_TRAFFIC_SHEET_NAME",
            "GOOGLE_AI_API_KEY",
            "GOOGLE_API_KEY",
            "GOOGLE_GENERATIVE_AI_API_KEY",
            "GOOGLE_GEMINI_API_KEY",
            "GOOGLE_SHEET_ID",
            "GOOGLE_SERVICE_ACCOUNT_JSON",
            "GOOGLE_SERVICE_ACCOUNT_EMAIL",
            "GOOGLE_PRIVATE_KEY"
          ];
          const env = Object.fromEntries(keys.map((key) => [key, process.env[key] || ""]));
          env.TRAINER_API_URL = trainerApiUrl;
          env.TRAINER_ADMIN_API_KEY = adminKey;
          env.TRAINER_SERVICE_TAG = process.env.TRAINER_SERVICE_TAG || "retro-pressa";
          env.TRAINER_BOT_USERNAME = trainerBotUsername;
          env.TRAINING_DATA_DIR = "/opt/retro-pressa-shared/data/training";
          fs.writeFileSync("runtime-env.json", JSON.stringify(env, null, 2));

          const backendEnv = {
            PORT: "3100",
            NODE_ENV: "production",
            DATABASE_PATH: "/opt/pressa-backend-shared/data/gift-ai.db",
            GEMINI_API_KEY: process.env.GEMINI_API_KEY || "",
            GEMINI_MODEL: process.env.GEMINI_MODEL || "gemini-2.5-flash",
            GEMINI_MODEL_FALLBACK: "gemini-2.5-flash-lite",
            ADMIN_API_KEY: adminKey,
            TRAINER_BOT_USERNAME: trainerBotUsername,
            PUBLIC_API_URL: "http://127.0.0.1:3100",
            CRM_PROVIDER: "none",
            LOG_LEVEL: "info"
          };
          fs.writeFileSync("trainer-backend-env.json", JSON.stringify(backendEnv, null, 2));
          NODE

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload archive
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "rm -rf /tmp/trainer-backend-overlay /tmp/overlay-fallback"
          scp -i ~/.ssh/deploy_key retro-pressa-deploy.tar.gz \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/retro-pressa-deploy.tar.gz"
          scp -i ~/.ssh/deploy_key runtime-env.json \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/retro-pressa-runtime-env.json"
          scp -i ~/.ssh/deploy_key trainer-backend-env.json \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/trainer-backend-env.json"
          scp -i ~/.ssh/deploy_key -r scripts/trainer-backend-overlay \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/trainer-backend-overlay"

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" << 'EOF'
          set -e
          if ! command -v pm2 > /dev/null; then
            npm install -g pm2
          fi
          if ! command -v git > /dev/null; then
            echo "git is required for trainer backend deploy" >&2
            exit 1
          fi

          BACKEND_DATA="/opt/pressa-backend-shared/data"
          BACKEND_ENV="/opt/pressa-backend/runtime-env.json"
          PRESSA_SRC="/opt/pressa-src"
          mkdir -p "$BACKEND_DATA" /opt/pressa-backend

          OVERLAY_DIR="/tmp/trainer-backend-overlay"
          if [ ! -f "$OVERLAY_DIR/manager-sessions.ts" ]; then
            mkdir -p /tmp/overlay-fallback
            tar -xzf /tmp/retro-pressa-deploy.tar.gz -C /tmp/overlay-fallback ./trainer-backend-overlay
            OVERLAY_DIR="/tmp/overlay-fallback/trainer-backend-overlay"
          fi
          if [ ! -f "$OVERLAY_DIR/manager-sessions.ts" ]; then
            echo "Trainer overlay missing on server" >&2
            exit 1
          fi

          if [ ! -d "$PRESSA_SRC/.git" ]; then
            git clone --depth 1 https://github.com/dpishalking/pressa.git "$PRESSA_SRC"
          else
            cd "$PRESSA_SRC"
            git fetch --depth 1 origin main
            git reset --hard origin/main
          fi

          node "$OVERLAY_DIR/apply-patch.mjs" "$PRESSA_SRC/gift-ai"
          cd "$PRESSA_SRC/gift-ai"
          npm ci
          npm run build -w backend
          cp /tmp/trainer-backend-env.json "$BACKEND_ENV"
          chmod 600 "$BACKEND_ENV"

          cat > "$PRESSA_SRC/gift-ai/backend/ecosystem.config.cjs" <<'PM2BACKEND'
          const runtimeEnv = require("/opt/pressa-backend/runtime-env.json");

          module.exports = {
            apps: [
              {
                name: "pressa-backend",
                script: "dist/index.js",
                cwd: "/opt/pressa-src/gift-ai/backend",
                env: {
                  ...runtimeEnv,
                  NODE_ENV: "production"
                }
              }
            ]
          };
          PM2BACKEND

          if pm2 describe pressa-backend > /dev/null; then
            pm2 delete pressa-backend
          fi
          pm2 start "$PRESSA_SRC/gift-ai/backend/ecosystem.config.cjs"
          sleep 5
          curl -f -sS http://127.0.0.1:3100/health > /dev/null
          curl -f -sS http://127.0.0.1:3100/trainer/scenarios > /dev/null
          if ! node -e "const env=require('$BACKEND_ENV'); if(!env.GEMINI_API_KEY){process.exit(1)}"; then
            echo "WARNING: GEMINI_API_KEY is empty — trainer bot replies will fail until the secret is set" >&2
          fi

          # Trainer Telegram bot runs on Railway only (retro-pressa-bot / trainer-bot).
          # Never start it on VPS — duplicate token causes silent failures in Telegram.
          if pm2 describe pressa-trainer-bot > /dev/null 2>&1; then
            pm2 delete pressa-trainer-bot || pm2 stop pressa-trainer-bot || true
            pm2 save
          fi
          echo "Trainer bot: Railway only (not VPS)"

          APP_DIR="/opt/retro-pressa"
          APP_SHARED_DIR="/opt/retro-pressa-shared"
          APP_DATA_DIR="$APP_SHARED_DIR/data"
          mkdir -p "$APP_DIR" "$APP_DATA_DIR/bitrix-snapshots" "$APP_DATA_DIR/google-snapshots" "$APP_DATA_DIR/conversation-snapshots" "$APP_DATA_DIR/conversation-exports" "$APP_DATA_DIR/training" "$APP_DATA_DIR/auth"
          AUTH_FILE="$APP_DATA_DIR/auth/users.json"
          AUTH_BACKUP="$APP_DATA_DIR/auth/users.json.bak"
          if [ -f "$AUTH_FILE" ]; then
            cp "$AUTH_FILE" "$AUTH_BACKUP"
          fi
          find "$APP_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -xzf /tmp/retro-pressa-deploy.tar.gz -C "$APP_DIR"
          cd "$APP_DIR"
          ln -sfn "$APP_DATA_DIR" data
          if [ ! -f "$AUTH_FILE" ] && [ -f "$AUTH_BACKUP" ]; then
            cp "$AUTH_BACKUP" "$AUTH_FILE"
          fi
          if [ -f "$AUTH_FILE" ]; then
            echo "Auth users file present"
          else
            echo "Auth users file will be created on first login"
          fi
          if [ -d "$APP_DIR/conversation-exports" ]; then
            cp -R "$APP_DIR/conversation-exports/." "$APP_DATA_DIR/conversation-exports/"
          fi
          if [ -f "$APP_DIR/training-seed/products.json" ]; then
            cp "$APP_DIR/training-seed/products.json" "$APP_DATA_DIR/training/products.json"
          fi
          if [ -f "$APP_DIR/training-seed/crm-modules.json" ]; then
            cp "$APP_DIR/training-seed/crm-modules.json" "$APP_DATA_DIR/training/crm-modules.json"
          fi
          if [ -f "$APP_DIR/training-seed/practice-modules.json" ]; then
            cp "$APP_DIR/training-seed/practice-modules.json" "$APP_DATA_DIR/training/practice-modules.json"
          fi
          cp /tmp/retro-pressa-runtime-env.json runtime-env.json
          chmod 600 runtime-env.json
          cat > ecosystem.config.cjs <<'PM2EOF'
          const runtimeEnv = require("./runtime-env.json");

          module.exports = {
            apps: [
              {
                name: "retro-pressa",
                script: "server.js",
                env: {
                  ...runtimeEnv,
                  NODE_ENV: "production",
                  PORT: "4174",
                  HOSTNAME: "0.0.0.0"
                }
              }
            ]
          };
          PM2EOF
          if pm2 describe retro-pressa > /dev/null; then
            pm2 delete retro-pressa
          fi
          pm2 start ecosystem.config.cjs
          pm2 save
          sleep 3
          curl -f -sS -X POST http://127.0.0.1:4174/api/conversations/seed-archives || true
          EOF
