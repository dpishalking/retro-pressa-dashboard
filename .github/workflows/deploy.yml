name: Deploy Retro Pressa

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_DIR: /opt/retro-pressa
      APP_NAME: retro-pressa
      APP_PORT: "4174"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create deploy archive
        run: |
          mkdir -p /tmp/retro-pressa-deploy/.next
          cp -R .next/standalone/. /tmp/retro-pressa-deploy/
          cp -R .next/static /tmp/retro-pressa-deploy/.next/static
          cp -R public /tmp/retro-pressa-deploy/public
          tar -czf /tmp/retro-pressa-deploy.tar.gz -C /tmp/retro-pressa-deploy .
          mv /tmp/retro-pressa-deploy.tar.gz retro-pressa-deploy.tar.gz

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload archive
        run: |
          scp -i ~/.ssh/deploy_key retro-pressa-deploy.tar.gz \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/retro-pressa-deploy.tar.gz"

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" << 'EOF'
          set -e
          if ! command -v pm2 > /dev/null; then
            npm install -g pm2
          fi
          mkdir -p /opt/retro-pressa
          rm -rf /opt/retro-pressa/*
          tar -xzf /tmp/retro-pressa-deploy.tar.gz -C /opt/retro-pressa
          cd /opt/retro-pressa
          if pm2 describe retro-pressa > /dev/null; then
            pm2 delete retro-pressa
          fi
          PORT=4174 HOSTNAME=0.0.0.0 pm2 start server.js --name retro-pressa
          pm2 save
          EOF
