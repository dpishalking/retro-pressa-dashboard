name: Trainer VPS cleanup

on:
  workflow_dispatch:
    inputs:
      action:
        description: "stop-vps-trainer or restart-backend"
        required: false
        default: "stop-vps-trainer"

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Manage trainer on VPS
        run: |
          ACTION="${{ github.event.inputs.action || 'stop-vps-trainer' }}"
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" << EOF
          set -e
          echo "=== pm2 status ==="
          pm2 list || true

          if [ "$ACTION" = "restart-backend" ]; then
            echo "Restarting pressa-backend only (trainer bot is on Railway)"
            pm2 restart pressa-backend 2>/dev/null || echo "pressa-backend not running"
            sleep 2
            curl -fsS http://127.0.0.1:3100/health | head -c 200 || echo "backend health FAILED"
            echo
            pm2 save
            exit 0
          fi

          echo "Ensuring VPS trainer bot is stopped (Railway handles @dushnila12_bot)"
          if pm2 describe pressa-trainer-bot > /dev/null 2>&1; then
            pm2 delete pressa-trainer-bot || pm2 stop pressa-trainer-bot || true
          fi
          pm2 save
          pm2 list
          EOF
