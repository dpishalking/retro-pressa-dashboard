name: OS Daily Sheets Sync

# 12:00 Europe/Moscow = 09:00 UTC (MSK is UTC+3 year-round)
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Refresh OS Orders + Traffic for yesterday (Moscow)
        env:
          CRON_SYNC_SECRET: ${{ secrets.CRON_SYNC_SECRET }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            CRON_SYNC_SECRET="$CRON_SYNC_SECRET" AUTH_SECRET="$AUTH_SECRET" \
            bash -s << 'EOF'
          set -euo pipefail
          SECRET="${CRON_SYNC_SECRET:-$AUTH_SECRET}"
          if [ -z "$SECRET" ]; then
            echo "CRON_SYNC_SECRET/AUTH_SECRET is empty"
            exit 1
          fi
          curl -f -sS -X POST http://127.0.0.1:4174/api/sync/os-daily \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${SECRET}" \
            -d '{"refresh":true}'
          EOF
